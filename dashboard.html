
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian Partner Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0d0d14;
      color: #f5f5f7;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --bg: #0d0d14;
      --surface: #15151f;
      --surface-2: #1b1b29;
      --border: rgba(255,255,255,0.08);
      --text: #f5f5f7;
      --text-dim: rgba(245,245,247,0.6);
      --text-dimmer: rgba(245,245,247,0.45);
      --accent: #D9A441;
      --accent-soft: rgba(217,164,65,0.14);
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --blue-gray: #8B9DAF;
    }
    .dashboard-root { display: flex; min-height: 100vh; width: 100%; max-width: 100vw; }
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      z-index: 40; display: none;
    }
    .sidebar-overlay.show { display: block; }
    .sidebar {
      width: 260px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      padding: 20px 16px 16px; position: fixed; left: 0; top: 0;
      height: 100vh; overflow-y: auto; z-index: 30;
    }
    .sidebar-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px; padding: 0 4px;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-logo-slot { height: 34px; display: flex; align-items: center; flex-shrink: 0; }
    .brand-logo-img {
      height: 100%; width: auto; max-width: 170px;
      object-fit: contain; display: block;
    }
    .brand-logo-fallback {
      width: 34px; height: 34px; border-radius: 10px;
      border: 1px dashed rgba(217,164,65,0.45); color: var(--accent);
      font-size: 15px; align-items: center; justify-content: center; display: none;
    }
    .close-btn {
      display: none; background: none; border: none; color: var(--text-dim);
      font-size: 18px; padding: 4px 8px;
    }
    .sidebar-section-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em;
      color: var(--text-dimmer); text-transform: uppercase;
      margin: 14px 8px 8px;
    }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      background: none; border: none; width: 100%;
      padding: 10px 12px; border-radius: 10px;
      color: var(--text-dim); font-size: 13.5px; font-weight: 500;
      text-align: left; transition: background .2s ease, color .2s ease;
      position: relative;
    }
    .nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .nav-item.nav-active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
    .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .nav-badge { margin-left: auto; background: var(--accent); color: #1a140b; font-size: 10.5px; font-weight: 700; padding: 1px 7px; border-radius: 999px; }
    .logout-full-btn {
      margin-top: auto; width: 100%; padding: 11px; border-radius: 10px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .2s ease; text-decoration: none;
    }
    .logout-full-btn:hover { background: rgba(239,68,68,0.18); }
    .main-content {
      flex: 1; min-width: 0; max-width: 100%; display: flex; flex-direction: column;
      margin-left: 260px;
    }
    .topbar {
      position: sticky;
      top: 0; z-index: 25;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; padding: 16px 28px;
      background: rgba(13,13,20,0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; min-width: 0; flex: 1 1 auto; }
    .hamburger {
      display: none; flex-direction: column; justify-content: center; gap: 4px;
      width: 38px; height: 38px; border-radius: 9px;
      background: var(--surface-2); border: 1px solid var(--border);
      align-items: center; flex-shrink: 0;
    }
    .hamburger span { width: 16px; height: 2px; background: var(--text); border-radius: 2px; }
    .page-title { min-width: 0; }
    .page-title h1 { font-size: 19px; font-weight: 700; margin: 0; }
    .page-title p { font-size: 12.5px; color: var(--text-dim); margin: 3px 0 0; }
    .topbar-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 12px;
      min-width: 0;
    }
    .search-box input {
      background: none; border: none; outline: none; color: var(--text);
      font-size: 13px; width: 190px; max-width: 100%; min-width: 0;
    }
    .search-box input::placeholder { color: var(--text-dimmer); }
    .search-icon { font-size: 13px; opacity: 0.7; }
    .icon-btn {
      position: relative; width: 38px; height: 38px; border-radius: 10px;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 15px;
      flex-shrink: 0;
    }
    .notif-dot {
      position: absolute; top: 7px; right: 8px; width: 7px; height: 7px;
      border-radius: 50%; background: var(--red); border: 1.5px solid var(--surface);
    }
    .content-area { padding: 24px 28px 48px; min-width: 0; max-width: 100%; overflow-x: hidden; }
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px 18px 16px; min-width: 0;
      transition: border-color .2s ease, transform .2s ease;
    }
    .stat-card:hover { border-color: rgba(217,164,65,0.35); transform: translateY(-2px); }
    .stat-accent { border-color: rgba(217,164,65,0.4); background: linear-gradient(160deg, rgba(217,164,65,0.07), var(--surface) 60%); }
    .stat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .stat-icon { font-size: 18px; }
    .stat-delta { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; }
    .stat-delta.up { color: #86efac; background: rgba(34,197,94,0.14); }
    .stat-value { font-size: 26px; font-weight: 800; letter-spacing: -0.01em; }
    .stat-label { font-size: 12.5px; color: var(--text-dim); margin-top: 4px; }
    .stat-bar { height: 5px; background: rgba(255,255,255,0.06); border-radius: 999px; margin-top: 12px; overflow: hidden; }
    .stat-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #e8c9a8); border-radius: 999px; transition: width 1s ease; }
    .mid-grid { display: grid; grid-template-columns: 1.7fr 1fr; gap: 16px; margin-bottom: 16px; align-items: start; }
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: start; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; margin-bottom: 16px; min-width: 0;
    }
    .card-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .card-title { font-size: 15px; font-weight: 700; margin: 0; }
    .card-sub { font-size: 12px; color: var(--text-dim); margin: 3px 0 0; }
    .table-wrapper { overflow-x: auto; max-width: 100%; -webkit-overflow-scrolling: touch; }
    .excavations-table { width: 100%; border-collapse: collapse; min-width: 640px; }
    .excavations-table th {
      text-align: left; font-size: 10.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: var(--text-dimmer);
      padding: 0 10px 10px; border-bottom: 1px solid var(--border);
    }
    .excavations-table td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
    .excavations-table tr:last-child td { border-bottom: none; }
    .excavations-table tbody tr { transition: background .15s ease; }
    .excavations-table tbody tr:hover { background: rgba(255,255,255,0.025); }
    .t-name { font-weight: 600; font-size: 13px; }
    .t-sub { font-size: 11.5px; color: var(--text-dimmer); margin-top: 2px; }
    .type-col { color: var(--text-dim); }
    .date-col { color: var(--text-dim); white-space: nowrap; }
    .budget-col { font-weight: 700; white-space: nowrap; }
    .region-tag {
      font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
      border: 1px solid; white-space: nowrap;
    }
    .status-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
    .status-active { background: rgba(34,197,94,0.14); color: #86efac; }
    .status-field { background: rgba(245,158,11,0.14); color: #fcd34d; }
    .status-complete { background: rgba(139,157,175,0.18); color: #c7d3dc; }
    .status-review { background: rgba(217,164,65,0.16); color: #e8c9a8; }
    .progress-wrap { display: flex; align-items: center; gap: 8px; min-width: 100px; }
    .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.07); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #e8c9a8); border-radius: 999px; }
    .progress-pct { font-size: 11.5px; color: var(--text-dim); flex-shrink: 0; }
    .activity-list { display: flex; flex-direction: column; gap: 4px; padding: 0; margin: 0; }
    .activity-item {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px 6px; border-radius: 10px;
      transition: background .15s ease;
    }
    .activity-item:hover { background: rgba(255,255,255,0.03); }
    .act-icon { font-size: 17px; flex-shrink: 0; line-height: 1.4; }
    .act-body { flex: 1; min-width: 0; }
    .act-text { font-size: 13px; margin: 0; line-height: 1.5; word-wrap: break-word; }
    .act-time { font-size: 11.5px; color: var(--text-dimmer); margin-top: 4px; display: block; }
    .team-list { display: flex; flex-direction: column; gap: 4px; padding: 0; margin: 0; }
    .team-item {
      display: flex; align-items: center; gap: 12px; padding: 10px 6px; border-radius: 10px;
      transition: background .15s ease;
    }
    .team-item:hover { background: rgba(255,255,255,0.03); }
    .member-avatar {
      position: relative; width: 38px; height: 38px; border-radius: 50%;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12.5px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .online-dot {
      position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px;
      border-radius: 50%; border: 2px solid var(--surface);
    }
    .dot-active { background: var(--green); }
    .dot-away { background: var(--amber); }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-size: 13px; font-weight: 600; }
    .member-role { font-size: 11.5px; color: var(--text-dimmer); margin-top: 1px; }
    .member-projects { text-align: center; flex-shrink: 0; }
    .proj-count { display: block; font-size: 14px; font-weight: 800; color: var(--accent); }
    .proj-label { display: block; font-size: 10px; color: var(--text-dimmer); }
    .milestone-list { display: flex; flex-direction: column; padding: 0; margin: 0; }
    .milestone-item {
      display: flex; align-items: flex-start; gap: 12px; padding: 12px 6px; border-radius: 10px;
      position: relative; transition: background .15s ease;
    }
    .milestone-item:hover { background: rgba(255,255,255,0.03); }
    .ms-date { width: 34px; flex-shrink: 0; text-align: center; }
    .ms-date span { display: block; }
    .ms-date span:first-child { font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; }
    .ms-date span:last-child { font-size: 16px; font-weight: 800; }
    .ms-line { width: 2px; align-self: stretch; display: flex; justify-content: center; flex-shrink: 0; }
    .ms-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); margin-top: 4px; }
    .ms-body { flex: 1; min-width: 0; }
    .ms-event { font-size: 13px; font-weight: 600; }
    .ms-project { font-size: 11.5px; color: var(--text-dimmer); margin-top: 2px; }
    .ms-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: rgba(239,68,68,0.16); color: #fca5a5; flex-shrink: 0; align-self: flex-start; }
    .ms-done-tag { background: rgba(34,197,94,0.16); color: #86efac; }
    .ms-done .ms-event { text-decoration: line-through; color: var(--text-dimmer); }
    .donut-chart { display: flex; justify-content: center; margin: 6px 0 14px; }
    .donut-svg { width: 150px; height: 150px; max-width: 100%; }
    .donut-num { font-size: 22px; font-weight: 800; fill: var(--text); }
    .donut-label { font-size: 9px; fill: var(--text-dimmer); text-transform: uppercase; letter-spacing: 0.06em; }
    .legend-list { display: flex; flex-direction: column; gap: 9px; padding: 0; margin: 0; }
    .legend-item { display: flex; align-items: center; gap: 9px; padding: 4px 6px; border-radius: 8px; }
    .legend-item:hover { background: rgba(255,255,255,0.03); }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-label { flex: 1; font-size: 12.5px; color: var(--text-dim); }
    .legend-count { font-size: 12.5px; font-weight: 700; }
    .btn-outline {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      padding: 7px 14px; border-radius: 999px; font-size: 12.5px; font-weight: 600;
      transition: border-color .2s ease, color .2s ease;
    }
    .btn-outline:hover { border-color: rgba(255,255,255,0.25); color: var(--text); }
    .btn-active { border-color: var(--accent) !important; color: var(--accent) !important; }
    .team-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
    .team-card {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px;
      padding: 16px; cursor: pointer; min-width: 0; transition: border-color .2s ease, transform .2s ease;
    }
    .research-card {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; cursor: pointer; min-width: 0; transition: border-color .2s ease, transform .2s ease;
    }
    .schedule-row {
      display: flex; align-items: center; gap: 14px; padding: 14px 10px; border-radius: 10px;
      cursor: pointer; transition: background .15s ease, transform .15s ease;
    }
    .evt-tag { font-size: 10.5px; font-weight: 700; padding: 3px 10px; border-radius: 999px; flex-shrink: 0; }
    .pub-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
    .pub-card {
      background: var(--surface-2); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px; cursor: pointer; min-width: 0; transition: border-color .2s ease, transform .2s ease;
    }
    .toggle-switch {
      width: 42px; height: 24px; border-radius: 999px; cursor: pointer;
      position: relative; flex-shrink: 0; transition: background .3s ease;
    }
    .toggle-knob {
      position: absolute; top: 3px; width: 18px; height: 18px; border-radius: 50%;
      background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.3); transition: left .3s ease;
    }
    select.pref-select {
      background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 7px 12px; font-size: 13px; outline: none;
    }
    @media (max-width: 1200px) {
      .mid-grid { grid-template-columns: 1fr; }
      .bottom-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 1024px) {
      .sidebar {
        z-index: 50;
        transform: translateX(-100%); transition: transform .3s ease;
        will-change: transform;
      }
      .sidebar.sidebar-open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .close-btn { display: block; }
      .hamburger { display: flex; }
      .stats-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .team-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .pub-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 720px) {
      .bottom-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .content-area { padding: 18px 16px 40px; }
      .topbar { padding: 14px 16px; }
      .search-box input { width: 120px; }
      .team-grid { grid-template-columns: 1fr; }
      .pub-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .stat-card { padding: 14px; }
      .stat-value { font-size: 22px; }
      .card { padding: 14px; }
      .page-title h1 { font-size: 17px; }
    }
    @media (max-width: 400px) {
      .search-box { display: none; }
      .topbar { padding: 12px 12px; gap: 8px; }
      .content-area { padding: 14px 12px 32px; }
      .stat-card { padding: 12px; }
      .sidebar { width: 84%; max-width: 300px; }
    }
  </style>
</head>
<body>
<div class="dashboard-root">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside class="sidebar" id="sidebar">

      <div class="brand">
        <span class="brand-logo-slot">
          <img id="brand-logo-img" src="./Assets/Logo.webp" alt="Company logo" class="brand-logo-img"

        </span>
      </div>
      <button class="close-btn" id="close-sidebar-btn" aria-label="Close sidebar">✕</button>

    <div class="sidebar-section-label">MAIN MENU</div>
    <nav class="sidebar-nav" id="nav-main"></nav>
    <div class="sidebar-section-label">MANAGEMENT</div>

        <div class="page-title">

          <p id="page-sub-text"></p>

    <div class="content-area" id="content-area"></div>
  </main>
</div>

  function renderReports() {
    const stats = [
      { icon: "📄", value: fieldReports.length, label: "Active Reports", bar: 80, accent: true },
      { icon: "✅", value: fieldReports.filter(p => p.status === "Published").length, label: "Published", bar: 70 },
      { icon: "🔍", value: fieldReports.filter(p => p.status === "In Review").length, label: "In Review", bar: 20 },
      { icon: "📊", value: fieldReports.reduce((a, p) => a + p.reads, 0), label: "Total Reads", bar: 60 }
    ];
    const statsHtml = stats.map(s =>
      `<div class="stat-card ${s.accent ? "stat-accent" : ""}" style="cursor:pointer" onclick="go404()">
        <div class="stat-top"><span class="stat-icon">${s.icon}</span></div>
        <div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${s.bar}%"></div></div>
      </div>`
    ).join("");

    const cards = fieldReports.map(p =>
      `<div class="research-card" onclick="go404()">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
          <div style="flex:1;min-width:180px">
            <div style="font-weight:700;color:#fff;font-size:14px;margin-bottom:4px">${p.title}</div>
            <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:6px">${p.authors}</div>
            <div style="font-size:12px;color:var(--text-dimmer)">${p.journal} · ${p.year}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
            <span style="background:${reportStatusColor[p.status]}22;color:${reportStatusColor[p.status]};border-radius:999px;padding:3px 10px;font-size:11.5px;font-weight:700">${p.status}</span>
            ${p.reads > 0 ? `<span style="font-size:12px;color:var(--text-dim)">📊 ${p.reads} reads</span>` : ''}
          </div>
        </div>
      </div>`
    ).join("");

    return `
      <section class="stats-grid">${statsHtml}</section>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Field Reports</h2><p class="card-sub">Active studies and submissions</p></div></div>
      <div style="display:flex;flex-direction:column;gap:14px">${cards}</div></div>
    `;
  }

  function renderSchedule() {
    const rows = scheduleEvents.map(ev => {
      const parts = ev.date.split(" ");
      let tag = "";
      if (ev.type === "urgent") tag = `<span class="evt-tag" style="background:rgba(239,68,68,0.16);color:#fca5a5">Urgent</span>`;
      if (ev.type === "meeting") tag = `<span class="evt-tag" style="background:rgba(139,157,175,0.2);color:#8B9DAF">Meeting</span>`;
      return `<div class="schedule-row" onclick="go404()">
        <div style="width:50px;flex-shrink:0;text-align:center">
          <div style="font-size:11px;font-weight:700;color:${scheduleTypeColor[ev.type]};text-transform:uppercase;letter-spacing:0.04em">${parts[0]}</div>
          <div style="font-size:18px;font-weight:800;color:#fff">${parts[1]}</div>
        </div>
        <div style="width:3px;align-self:stretch;border-radius:999px;background:${scheduleTypeColor[ev.type]};opacity:0.7;flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;color:#fff;font-size:13.5px">${ev.event}</div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:3px">📍 ${ev.site}</div>
        </div>${tag}
      </div>`;
    }).join("");

    return `<div class="card"><div class="card-header"><div><h2 class="card-title">Field Calendar</h2><p class="card-sub">All upcoming deadlines and events</p></div></div>
      <div style="display:flex;flex-direction:column;gap:4px">${rows}</div></div>`;
  }

  function renderBudget() {
    const totalAllocated = budgetData.reduce((a, b) => a + b.allocated, 0);
    const totalSpent = budgetData.reduce((a, b) => a + b.spent, 0);
    const remaining = totalAllocated - totalSpent;
    const utilRate = Math.round((totalSpent / totalAllocated) * 100);
    const stats = [
      { icon: "💰", value: fmt(totalAllocated), label: "Total Allocated", bar: 100, accent: true },
      { icon: "📉", value: fmt(totalSpent), label: "Total Spent", bar: utilRate },
      { icon: "✅", value: fmt(remaining), label: "Remaining", bar: Math.round((remaining / totalAllocated) * 100) },
      { icon: "📊", value: utilRate + "%", label: "Utilisation Rate", bar: utilRate }
    ];
    const statsHtml = stats.map(s =>
      `<div class="stat-card ${s.accent ? "stat-accent" : ""}" style="cursor:pointer" onclick="go404()">
        <div class="stat-top"><span class="stat-icon">${s.icon}</span></div>
        <div class="stat-value" style="font-size:22px">${s.value}</div><div class="stat-label">${s.label}</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${s.bar}%"></div></div>
      </div>`
    ).join("");

    const rows = budgetData.map(b => {
      const pct = Math.round((b.spent / b.allocated) * 100);
      const barGrad = pct > 85 ? "linear-gradient(90deg,#ef4444,#f87171)" : "linear-gradient(90deg,#D9A441,#e8c9a8)";
      return `<div onclick="go404()" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
          <div><span style="font-weight:700;color:#fff;font-size:13.5px">${b.site}</span>
          <span class="region-tag" style="margin-left:10px;color:${regionAccents[b.region]};border-color:${regionAccents[b.region]};background:${regionAccents[b.region]}1f;font-size:11px">${b.region}</span></div>
          <div style="text-align:right;font-size:12.5px;color:var(--text-dim)"><span style="color:#fff;font-weight:700">${fmt(b.spent)}</span> / ${fmt(b.allocated)}
          <span style="margin-left:10px;color:${pct > 80 ? "#fca5a5" : "#D9A441"};font-weight:700">${pct}%</span></div>
        </div>
        <div style="height:8px;background:rgba(255,255,255,0.07);border-radius:999px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${barGrad};border-radius:999px;transition:width 1.5s ease"></div>
        </div>
      </div>`;
    }).join('<div style="height:18px"></div>');

    return `
      <section class="stats-grid">${statsHtml}</section>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Budget by Region</h2><p class="card-sub">Allocation vs spend</p></div></div>
      <div>${rows}</div></div>
    `;
  }

  function renderTraining() {
    const stats = [
      { icon: "📚", value: trainingLibrary.length, label: "Resources", bar: 80, accent: true },
      { icon: "📥", value: trainingLibrary.reduce((a, p) => a + p.downloads, 0).toLocaleString(), label: "Total Downloads", bar: 90 },
      { icon: "📄", value: trainingLibrary.reduce((a, p) => a + p.pages, 0).toLocaleString(), label: "Total Pages", bar: 65 },
      { icon: "🗓️", value: "2025", label: "Latest Year", bar: 100 }
    ];
    const statsHtml = stats.map(s =>
      `<div class="stat-card ${s.accent ? "stat-accent" : ""}" style="cursor:pointer" onclick="go404()">
        <div class="stat-top"><span class="stat-icon">${s.icon}</span></div>
        <div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div>
        <div class="stat-bar"><div class="stat-bar-fill" style="width:${s.bar}%"></div></div>
      </div>`
    ).join("");

    const cards = trainingLibrary.map(pub =>
      `<div class="pub-card" onclick="go404()">
        <div style="font-size:30px;margin-bottom:12px">📖</div>
        <div style="font-weight:700;color:#fff;font-size:14px;margin-bottom:6px;line-height:1.4">${pub.title}</div>
        <div style="font-size:12px;color:var(--text-dimmer);margin-bottom:14px">${pub.type} · ${pub.year} · ${pub.pages} pages</div>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <span style="font-size:12px;color:#D9A441;font-weight:700">📥 ${pub.downloads.toLocaleString()} downloads</span>
          <button class="btn-outline" style="padding:5px 12px;font-size:11.5px" onclick="event.stopPropagation();go404()">View</button>
        </div>
      </div>`
    ).join("");

    return `
      <section class="stats-grid">${statsHtml}</section>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Published Resources</h2><p class="card-sub">Playbooks, guides, and reports</p></div></div>
      <div class="pub-grid">${cards}</div></div>
    `;
  }

  function toggleHtml(id, value) {
    return `<div class="toggle-switch" data-toggle="${id}" style="background:${value ? "#D9A441" : "rgba(255,255,255,0.12)"}">
      <div class="toggle-knob" style="left:${value ? "20px" : "3px"}"></div></div>`;
  }

  function renderSettings() {
    const s = state.settings;
    return `
      <div class="card"><div class="card-header"><div><h2 class="card-title">Account</h2><p class="card-sub">Your profile information</p></div></div>
        <div style="display:flex;align-items:center;gap:18px;margin-bottom:20px;flex-wrap:wrap">
          <img src="https://placehold.co/64x64/1b1b29/f5f5f7?text=You" alt="avatar" style="width:64px;height:64px;border-radius:50%;border:2px solid rgba(217,164,65,0.4)">
          <div><div style="font-weight:700;color:#fff;font-size:16px">Alex Morgan</div>
          <div style="font-size:13px;color:var(--text-dim);margin-top:2px">VP of Partner Success · alex.morgan@meridian.com</div>
          <div style="font-size:12px;color:#D9A441;margin-top:4px">🏬 7 years with Meridian</div></div>
        </div>
        <button class="btn-outline" style="border-color:#D9A441;color:#D9A441" onclick="go404()">Edit Profile</button>
      </div>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Preferences</h2><p class="card-sub">Notifications and display</p></div></div>
        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
            <div><div style="font-weight:700;color:#fff;font-size:13.5px">Push Notifications</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Receive alerts for rank-ups and deadline changes</div></div>
            ${toggleHtml("notifications", s.notifications)}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
            <div><div style="font-weight:700;color:#fff;font-size:13.5px">Weekly Email Digest</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Summary of team activity sent every Monday</div></div>
            ${toggleHtml("emailDigest", s.emailDigest)}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
            <div><div style="font-weight:700;color:#fff;font-size:13.5px">Dark Mode</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Use dark colour scheme across the dashboard</div></div>
            ${toggleHtml("darkMode", s.darkMode)}
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding-top:18px">
            <div><div style="font-weight:700;color:#fff;font-size:13.5px">Language</div><div style="font-size:12.5px;color:var(--text-dim);margin-top:2px">Interface display language</div></div>
            <select class="pref-select" id="lang-select">${["English", "French", "Spanish", "Arabic", "Greek"].map(l => `<option ${s.language === l ? "selected" : ""}>${l}</option>`).join("")}</select>
          </div>
        </div>
      </div>
      <div class="card"><div class="card-header"><div><h2 class="card-title">Danger Zone</h2><p class="card-sub">Irreversible account actions</p></div></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button class="btn-outline" style="border-color:rgba(239,68,68,0.4);color:#fca5a5" onclick="go404()">Reset Password</button>
          <button class="btn-outline" style="border-color:rgba(239,68,68,0.4);color:#fca5a5" onclick="go404()">Delete Account</button>
        </div>
      </div>
    `;
  }

  const pageRenderers = {
    dashboard: renderDashboard,
    launches: renderLaunches,
    teams: renderTeams,
    products: renderProducts,
    reports: renderReports,
    schedule: renderSchedule,
    budget: renderBudget,
    training: renderTraining,
    settings: renderSettings
  };

  function renderNav() {
    const mainItems = navItems.slice(0, 6);
    const mgmtItems = navItems.slice(6);
    function itemHtml(item) {
      const badge = item.id === "launches" ? `<span class="nav-badge">7</span>` : "";
      return `<button class="nav-item ${state.activeNav === item.id ? "nav-active" : ""}" data-nav="${item.id}">
        <span class="nav-icon">${item.icon}</span><span>${item.label}</span>${badge}</button>`;
    }
    document.getElementById("nav-main").innerHTML = mainItems.map(itemHtml).join("");
    document.getElementById("nav-management").innerHTML = mgmtItems.map(itemHtml).join("");
  }

  function renderPage() {
    const page = pageMap[state.activeNav];
    document.getElementById("page-title-text").textContent = page.title;
    document.getElementById("page-sub-text").textContent = page.sub;
    document.getElementById("content-area").innerHTML = pageRenderers[state.activeNav]();
    renderNav();
    window.scrollTo({ top: 0, left: 0, behavior: "instant" });
  }

  function navigateTo(id) {
    state.activeNav = id;
    closeSidebar();
    renderPage();
  }

  function openSidebar() {
    document.getElementById("sidebar").classList.add("sidebar-open");
    document.getElementById("sidebar-overlay").classList.add("show");
  }
  function closeSidebar() {
    document.getElementById("sidebar").classList.remove("sidebar-open");
    document.getElementById("sidebar-overlay").classList.remove("show");
  }

  document.getElementById("hamburger-btn").addEventListener("click", openSidebar);
  document.getElementById("close-sidebar-btn").addEventListener("click", closeSidebar);
  document.getElementById("sidebar-overlay").addEventListener("click", closeSidebar);
  document.getElementById("notif-btn").addEventListener("click", go404);

  document.addEventListener("click", function(e) {
    const navBtn = e.target.closest("[data-nav]");
    if (navBtn) { navigateTo(navBtn.getAttribute("data-nav")); return; }
    const filterBtn = e.target.closest(".launch-filter-btn");
    if (filterBtn) { state.launchFilter = filterBtn.getAttribute("data-filter"); renderPage(); return; }
    const toggle = e.target.closest("[data-toggle]");
    if (toggle) {
      const key = toggle.getAttribute("data-toggle");
      state.settings[key] = !state.settings[key];
      renderPage();
      return;
    }
  });

  document.addEventListener("input", function(e) {
    if (e.target && e.target.id === "product-search-input") {
      state.productSearch = e.target.value;
      const caretPos = e.target.selectionStart;
      renderPage();
      const input = document.getElementById("product-search-input");
      if (input) { input.focus(); input.setSelectionRange(caretPos, caretPos); }
    }
  });

  document.addEventListener("change", function(e) {
    if (e.target && e.target.id === "lang-select") {
      state.settings.language = e.target.value;
    }
  });

  renderPage();
</script>
</body>
</html>
